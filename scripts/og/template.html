<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OG Card — Nhật ký dev</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,400..700,0..100,0..1;1,9..144,400..700,0..100,0..1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:           #fbfaf6;
    --bg-elevated:  #ffffff;
    --bg-panel:     #f4f1ea;
    --border:       #d6d2c4;
    --border-soft:  #e8e3d4;
    --text:         #1f2328;
    --text-strong:  #0d1117;
    --text-muted:   #5d5b54;
    --text-fade:    #8a8775;
    --vermillion:        #C13B14;
    --vermillion-soft:   rgba(193, 59, 20, 0.10);
  }

  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(193,59,20,0.06), transparent 70%),
      var(--bg);
    color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    padding: 56px 80px 52px;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    isolation: isolate;
    position: relative;
  }

  /* ── Top brand strip ────────────────────────────── */
  .brand-strip {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 26px;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'SOFT' 30, 'WONK' 0;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text-strong);
  }
  .brand em {
    font-style: italic;
    font-weight: 400;
    color: var(--vermillion);
    font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
  }
  .domain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    font-weight: 500;
  }

  /* ── Body row (auto-centered content) ───────────── */
  .body-row {
    display: flex;
    align-items: center;
    position: relative;
    padding: 24px 0;
    overflow: hidden;
  }

  /* Default mode: huge wordmark + tagline */
  .default-content {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 1040px;
  }
  .wordmark {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'SOFT' 50, 'WONK' 1;
    font-style: italic;
    font-weight: 500;
    font-size: 168px;
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: var(--text-strong);
  }
  .wordmark em {
    font-style: italic;
    color: var(--vermillion);
    font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
    font-weight: 400;
  }
  .tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 32px;
    line-height: 1.4;
    color: var(--text-muted);
    max-width: 800px;
  }

  /* Per-post mode: chip + meta + big title */
  .post-content {
    display: none;
    flex-direction: column;
    gap: 28px;
    max-width: 1040px;
    width: 100%;
  }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    font-weight: 500;
  }
  .post-meta .chip {
    display: inline-flex;
    align-items: center;
    padding: 5px 14px;
    border-radius: 999px;
    background: var(--vermillion-soft);
    color: var(--vermillion);
    font-size: 16px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .post-meta .num { color: var(--text-strong); }
  .post-meta .dot { color: var(--text-fade); }
  .post-title {
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'SOFT' 30, 'WONK' 0;
    font-weight: 500;
    font-size: 72px;
    line-height: 1.04;
    letter-spacing: -0.025em;
    color: var(--text-strong);
    text-wrap: balance;
  }
  .post-title em {
    font-style: italic;
    color: var(--vermillion);
    font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
    font-weight: 400;
  }

  /* Watermark numeral on per-post (vestigial editorial flourish) */
  .num-watermark {
    position: absolute;
    right: -32px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Fraunces', serif;
    font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
    font-style: italic;
    font-weight: 300;
    font-size: 360px;
    line-height: 0.85;
    color: var(--vermillion);
    opacity: 0.07;
    letter-spacing: -0.06em;
    user-select: none;
    pointer-events: none;
    z-index: -1;
  }

  body.post .default-content { display: none; }
  body.post .post-content { display: flex; }
  body:not(.post) .num-watermark { display: none; }

  /* ── Bottom strip ───────────────────────────────── */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 22px;
    border-top: 1px solid var(--border-soft);
  }
  .bottom-left {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--vermillion);
    font-weight: 400;
    font-variation-settings: 'opsz' 96, 'SOFT' 100, 'WONK' 1;
  }
  .bottom-right {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }
</style>
</head>
<body>

  <header class="brand-strip">
    <span class="brand">Nhật ký <em>dev</em></span>
    <span class="domain">duthaho.dev</span>
  </header>

  <div class="body-row">

    <!-- DEFAULT MODE — shown when no `title` URL param -->
    <div class="default-content">
      <h1 class="wordmark">Nhật ký <em>dev</em></h1>
      <p class="tagline">Suy nghĩ sau giờ làm về AI, engineering, và nghề dev — viết từ góc nhìn cá nhân.</p>
    </div>

    <!-- PER-POST MODE — shown when body.post is set by JS below -->
    <div class="post-content">
      <div class="post-meta">
        <span class="chip" id="chip-slot">Bài viết</span>
        <span class="num" id="num-slot">#08</span>
        <span class="dot">·</span>
        <span id="date-slot">25 Apr 2026</span>
      </div>
      <h1 class="post-title" id="title-slot">Tiêu đề bài viết.</h1>
    </div>

    <span class="num-watermark" id="num-bg-slot">08</span>

  </div>

  <footer class="bottom">
    <span class="bottom-left">Suy nghĩ sau giờ làm</span>
    <span class="bottom-right">duthaho.dev</span>
  </footer>

<script>
  // URL contract preserved from old template: ?title=…|…&num=08&date=25/04/2026&kicker=…
  const q      = new URLSearchParams(location.search);
  const title  = q.get('title');
  const num    = q.get('num');
  const date   = q.get('date');     // expects DD/MM/YYYY
  const kicker = q.get('kicker');

  if (title) {
    document.body.classList.add('post');

    // Title supports an em-clause split with `|`
    const slot = document.getElementById('title-slot');
    const [a, b] = title.split('|');
    slot.innerHTML = b ? `${a.trim()} <em>${b.trim()}</em>` : a;

    if (num) {
      const padded = num.padStart(2, '0');
      document.getElementById('num-slot').textContent = '#' + padded;
      document.getElementById('num-bg-slot').textContent = padded;
    }

    // DD/MM/YYYY → DD Mmm YYYY (English month abbrev to match the home feed)
    if (date) {
      const m = date.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) {
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const idx = parseInt(m[2], 10) - 1;
        document.getElementById('date-slot').textContent =
          (idx >= 0 && idx < 12) ? `${m[1]} ${months[idx]} ${m[3]}` : date;
      } else {
        document.getElementById('date-slot').textContent = date;
      }
    }

    if (kicker) document.getElementById('chip-slot').textContent = kicker;
  }
</script>
</body>
</html>
